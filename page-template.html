<!DOCTYPE html>

<!--
===========================================================
FILE:       page-template.html
 
DESCRIPTION:
    Standard HTML page template for the Monroe Community
    College Information & Computer Technology Club website.
    Copy this file when creating a new page.
    
INSTRUCTIONS:
    1. Copy this file.
    2. Rename the copy to the new page name
       (example: projects.html).

    3. Update the DESCRIPTION above so it describes
       the purpose of the new page.

    4. Change the HTML <title> element so it reflects
       the new page. This text appears in the browser tab.

    5. Update the Hero section:
           - Change the page title (<h1>)
           - Change the subtitle

    6. Replace the contents of the <main> element
       with the information for the new page.

    7. Leave the following sections unchanged unless
       you are updating the entire website:
           - Header
           - Navigation
           - Footer

    8. Test the page locally.

    9. Commit your changes to GitHub using a
       descriptive commit message.
    
AUTHOR:
    Monroe Community College
    Information & Computer Technology Club
===========================================================
-->
 
<html lang="en">
 
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
              content="width=device-width, initial-scale=1.0">
        <!--
            Change the page title below.
        -->

        <title>Page Title - ICT Club</title>

        <link rel="stylesheet"
              href="styles.css">

    </head>

  <body>
      <header>
          <nav>
              <div class="logo">
                  ICT Club
              </div>
              <ul class="nav-links">
                  <li><a href="index.html">Home</a></li>
                  <li><a href="projects.html">Projects</a></li>
                  <li><a href="events.html">Events</a></li>
                  <li><a href="resources.html">Resources</a></li>
                  <li><a href="contact.html">Contact</a></li>
              </ul>
          </nav>
       
       <!--==================================================
           Hero Section
   
           Update the page title (<h1>) and subtitle below
           for the page you are creating.
       ==================================================-->
       <div class="hero">
              <h1>Page Title</h1>
              <p class="subtitle">
                  Page Subtitle
              </p>
          </div>
      </header>

      <!--==================================================
      Main Content
      Replace the section below with the content for
      your page.
   
      You may add additional <section> elements as
      needed.
   
      This is the ONLY section of the template that
      should normally be modified.
   
      The header, navigation, and footer should remain
      consistent across all pages.   
      ==================================================-->
      <main>
          <!--
              ==================================================
              Main Content
              ==================================================
          -->
          <section>
              <h2>Section Title</h2>
              <p>
                  Replace this text with page content.
              </p>
          </section>
      </main>
      
  <!--==================================================
      Footer
  
      Normally this section should not be modified.
      Changes here affect the consistency of the
      entire website.
  
  ==================================================-->
   <footer>
          <p>
              Monroe Community College
          </p>
          <p>
              Information &amp; Computer Technology Club
          </p>
      </footer>
  </body>
</html>
